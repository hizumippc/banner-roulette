<!DOCTYPE html>
<html lang="ja">

    <head prefix="og: http://ogp.me/ns#">
        <meta charset="UTF-8">

        <meta name="author" content="POSIPRO CREATE">
        <meta name="description" content="バナー制作練習のお題を生成するルーレットです">
        <title>バナー練習用　お題ルーレット</title>

        <meta property="og:title" content="バナー練習用　お題ルーレット">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://hizumippc.github.io/banner-roulette/">
        <meta property="og:image" content="">
        <meta property="og:description" content="バナー制作練習のお題を生成するルーレットです">

        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>

        <meta name="viewport" content="width=device-width,initial-scale=1">

    </head>

    <body>

        <h1>
            <span class="roulette-icon"></span>
            バナー練習用　お題ルーレット
        </h1>

        <div class="wrapper">

            <div class="left">

                <div class="button-row">
                    <button id="spinBtn" onclick="startSpin()"> ルーレット </button>
                    <button onclick="shareTwitter()">X共有</button>
                </div>

                <div class="container">

                    <div class="slot-box">
                        <div class="category">サービス</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="service" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('service')">🔄</div>
                        </div>
                    </div>

                    <div class="slot-box">
                        <div class="category">ターゲット</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="target" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('target')">🔄</div>
                        </div>
                    </div>

                    <div class="slot-box"> 
                        <div class="category">目的</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="purpose" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('purpose')">🔄</div>
                        </div>
                    </div>

                    <div class="slot-box">
                        <div class="category">トーン</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="tone" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('tone')">🔄</div>
                        </div>
                    </div>

                    <div class="slot-box">
                        <div class="category">訴求</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="appeal" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('appeal')">🔄</div>
                        </div>
                    </div>

                    <div class="slot-box">
                        <div class="category">サイズ</div>
                        <div class="slot-row">
                            <div class="slot">
                                <span id="size" class="slot-inner">---</span>
                            </div>
                            <div class="reroll" onclick="reroll('size')">🔄</div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="right">
                <h3>履歴</h3>
                <div id="historyList"></div>
            </div>

        </div>
        
    </body>
</html>
